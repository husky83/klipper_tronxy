[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f446xx_5A0040000651313031393839-if00

[mcu ebb36]
canbus_uuid: eb65417a5523

[printer]
kinematics: corexy
max_velocity: 500
max_accel: 3000
max_z_velocity: 15
max_z_accel: 100
square_corner_velocity: 5.0

[virtual_sdcard]
path: ~/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[pause_resume]

[display_status]
[adxl345]
cs_pin: ebb36: PB12
spi_software_sclk_pin: ebb36: PB10
spi_software_mosi_pin: ebb36: PB11
spi_software_miso_pin: ebb36: PB2
axes_map: x,y,z # To ustawimy dokładnie później przy kalibracji

[force_move]
enable_force_move: True

[stepper_x]
step_pin: PG0
dir_pin: PG1
enable_pin: !PF15
rotation_distance: 40
microsteps: 16

# endstop_pin: ^!PG6             # Dodałem ! przed PG6
endstop_pin: ^!ebb36:PB3 
position_endstop: 0
position_max: 399
homing_speed: 50        # Pierwszy dojazd może być szybki
homing_retract_dist: 5  # Odjedź 5mm...
homing_retract_speed: 10 # ...i wróć bardzo powoli, żeby precyzyjnie "kliknąć"
second_homing_speed: 5  # To zapewnia idealną powtarzalność punktu 0

[stepper_y]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
rotation_distance: 40
microsteps: 16
endstop_pin: ^!PG9             # Dodałem ! przed PG9
position_endstop: 0
position_max: 399
homing_speed: 50        # Pierwszy dojazd może być szybki
homing_retract_dist: 5  # Odjedź 5mm...
homing_retract_speed: 10 # ...i wróć bardzo powoli, żeby precyzyjnie "kliknąć"
second_homing_speed: 5  # To zapewnia idealną powtarzalność punktu 0

[bltouch]
sensor_pin: ^ebb36:PB8       # Zmieniliśmy z PB8 na PB6
control_pin: ebb36:PB9
x_offset: -36
y_offset: 0
#z_offset: 0
speed: 3.0
samples: 2                   # Zwiększamy do 2 dla stabilności
sample_retract_dist: 5.0
pin_move_time: 0.5
pin_up_touch_mode_reports_triggered: False
probe_with_touch_mode: false
stow_on_each_sample: true
pin_up_reports_not_triggered: True


[safe_z_home]
home_xy_position: 200, 200  # Wpisz środek swojego stołu!
speed: 50
z_hop: 10
z_hop_speed: 5


# PIERWSZY SILNIK Z (Motor 2)
[stepper_z]
step_pin: PG4
dir_pin: !PC1       # Dodaj ! jeśli kręci się odwrotnie niż pierwszy
enable_pin: !PA0
rotation_distance: 8
microsteps: 16
endstop_pin: probe:z_virtual_endstop
position_max: 399
position_min: -10



# DRUGI SILNIK Z (Motor 3)
[stepper_z1]
step_pin: PF11
dir_pin: !PG3       # Dodaj ! jeśli jedzie w dół zamiast w górę
enable_pin: !PG5

rotation_distance: 8
microsteps: 16

[z_tilt]
z_positions:
    -90, 200           # Fizyczna pozycja lewej śruby (X, Y)
    490, 200           # Fizyczna pozycja prawej śruby (X, Y)
points:
    76, 200
    386, 200
speed: 250             # Prędkość przejazdów między punktami
horizontal_move_z: 5  # Na jaką wysokość podnieść oś Z przed przejazdem
retries: 10            # Ile prób wyrównania dopuszczamy
retry_tolerance: 0.02  # Dokładność (0.02mm jest bardzo ok dla tak dużego stołu)


[heater_fan hotend_fan]
pin: ebb36:PA1
max_power: 1.0
kick_start_time: 0.5
heater: extruder      # Powiązanie z sekcją [extruder]
heater_temp: 50.0      # Temperatura włączenia
fan_speed: 1.0         # Prędkość (1.0 = 100%)

[extruder]
# SILNIK (Wpięty do Octopusa - np. Driver 4)
step_pin: PF9
dir_pin: PF10
enable_pin: !PG2
rotation_distance: 22.67 # Wartość dla Twojego ekstrudera
nozzle_diameter: 0.400        # Średnica dyszy (standard to 0.4)
filament_diameter: 1.750      # Średnica filamentu
microsteps: 16

# GRZAŁKA I CZUJNIK (Wpięte do EBB36)
heater_pin: ebb36:PB13      # Grzałka na CAN
sensor_pin: ebb36:PA3       # To Twoje TH0 na CAN
sensor_type: ATC Semitec 104GT-2 # Sprawdź typ swojego termistora!

# PARAMETRY TERMICZNE
control: pid
pid_kp: 22.2
pid_ki: 1.08
pid_kd: 114
min_temp: -200
max_temp: 280



[heater_bed]
heater_pin: PA1
sensor_type: Generic 3950
sensor_pin: PF3
control: watermark
# min_temp: -100
# max_temp: 120
# sensor_type: EPCOS 100K B57560G104F
# sensor_pin: PF3
min_temp: -273
max_temp: 9999


[verify_heater extruder]
max_error: 120

[verify_heater heater_bed]
max_error: 120

# =========================
# TMC2209 UART
# =========================

[tmc2209 stepper_x]
uart_pin: PC4
# run_current: 1.25
# hold_current: 0.85
run_current: 1
hold_current: 0.5
stealthchop_threshold: 0
interpolate: True

[tmc2209 stepper_y]
uart_pin: PD11
# run_current: 1.25
# hold_current: 0.85
run_current: 1
hold_current: 0.5
stealthchop_threshold: 0
interpolate: True

[tmc2209 stepper_z]
uart_pin: PC6
run_current: 0.800
hold_current: 0.5
[tmc2209 stepper_z1]
uart_pin: PC7
run_current: 0.800
hold_current: 0.5

[bed_mesh]
speed: 200
horizontal_move_z: 5
mesh_min: 40, 40       # Minimalne współrzędne SONDY (nie dyszy!)
mesh_max: 360, 360     # Maksymalne współrzędne SONDY
probe_count: 5, 5      # Siatka 5x5 (25 punktów pomiaru)
algorithm: bicubic
fade_start: 1
fade_end: 10
fade_target: 0



[gcode_macro START_PRINT]
description: Przygotowanie drukarki do pracy
gcode:
    # 1. Reset stanu BLTouch na wszelki wypadek
    BLTOUCH_DEBUG COMMAND=reset
    
    # 2. Bazowanie osi X i Y
    G28 X Y
    
    # 3. Przejazd na środek/bezpieczną pozycję
    G1 X200 Y200 F10000
    
   
    M117 Drukarka gotowa!





[gcode_macro CANCEL_PRINT]
description: Anulowanie wydruku
rename_existing: BASE_CANCEL_PRINT
gcode:
    TURN_OFF_HEATERS
    CLEAR_PAUSE
    SDCARD_RESET_FILE
    BASE_CANCEL_PRINT

[gcode_macro PAUSE]
description: Pauza wydruku
rename_existing: BASE_PAUSE
gcode:
    ##### Parametry #####
    {% set x_park = printer.toolhead.axis_maximum.x|float - 5.0 %}
    {% set y_park = printer.toolhead.axis_maximum.y|float - 5.0 %}
    {% set z_lift = 10.0 %}
    ##### Obliczenia #####
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set act_z = printer.toolhead.position.z|float %}
    {% if act_z < (max_z - z_lift) %}
        {% set z_safe = z_lift %}
    {% else %}
        {% set z_safe = max_z - act_z %}
    {% endif %}
    ##### Akcja #####
    PAUSE_BASE
    G91
    G1 Z{z_safe} F900
    G90
    G1 X{x_park} Y{y_park} F6000

[gcode_macro RESUME]
description: Wznowienie wydruku
rename_existing: BASE_RESUME
gcode:
    G91
    G1 E1 F2100 # Delikatna retrakcja/podanie filamentu przed startem
    G90
    RESUME_BASE

