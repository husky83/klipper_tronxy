[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f446xx_5A0040000651313031393839-if00

[mcu ebb36]
canbus_uuid: eb65417a5523

[printer]
kinematics: corexy
max_velocity: 600
max_accel: 4000
max_z_velocity: 25
max_z_accel: 200
square_corner_velocity: 5.0

[virtual_sdcard]
path: ~/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[pause_resume]

[display_status]
[adxl345]
cs_pin: ebb36: PB12
spi_software_sclk_pin: ebb36: PB10
spi_software_mosi_pin: ebb36: PB11
spi_software_miso_pin: ebb36: PB2
axes_map: x,y,z # To ustawimy dokładnie później przy kalibracji 

[resonance_tester]
accel_chip: adxl345
probe_points:
    200, 200, 20  # Środek Twojego stołu (ustaw pod swój wymiar!)


    
[force_move]
enable_force_move: True

[stepper_x]
step_pin: PG0
dir_pin: PG1
enable_pin: !PF15
rotation_distance: 40
microsteps: 16

# endstop_pin: ^!PG6             # Dodałem ! przed PG6
endstop_pin: ^!ebb36:PB3 
position_endstop: 0
position_max: 399
homing_speed: 80        # Pierwszy dojazd może być szybki
homing_retract_dist: 5  # Odjedź 5mm...
homing_retract_speed: 10 # ...i wróć bardzo powoli, żeby precyzyjnie "kliknąć"
second_homing_speed: 5  # To zapewnia idealną powtarzalność punktu 0

[stepper_y]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
rotation_distance: 40
microsteps: 16
endstop_pin: ^!PG9             # Dodałem ! przed PG9
position_endstop: 0
position_max: 399
homing_speed: 80        # Pierwszy dojazd może być szybki
homing_retract_dist: 5  # Odjedź 5mm...
homing_retract_speed: 10 # ...i wróć bardzo powoli, żeby precyzyjnie "kliknąć"
second_homing_speed: 5  # To zapewnia idealną powtarzalność punktu 0

[bltouch]
sensor_pin: ^ebb36:PB8       # Zmieniliśmy z PB8 na PB6
control_pin: ebb36:PB9
x_offset: -36
y_offset: -4
z_offset: 1.350
#z_offset: 1.800
speed: 5.0
samples: 1                   # Zwiększamy do 2 dla stabilności
sample_retract_dist: 3.0
samples_result: median        # Używa środkowej wartości zamiast średniej
samples_tolerance_retries: 3
pin_move_time: 0.5
pin_up_touch_mode_reports_triggered: False
probe_with_touch_mode: false
stow_on_each_sample: true
pin_up_reports_not_triggered: True
lift_speed:25



[safe_z_home]
home_xy_position: 200, 100  # Wpisz środek swojego stołu!
speed: 150
z_hop: 10
z_hop_speed: 5


# PIERWSZY SILNIK Z (Motor 2)
[stepper_z]
step_pin: PG4
dir_pin: !PC1       # Dodaj ! jeśli kręci się odwrotnie niż pierwszy
enable_pin: !PA0
rotation_distance: 8
microsteps: 16
endstop_pin: probe:z_virtual_endstop
position_max: 399
position_min: -2



# DRUGI SILNIK Z (Motor 3)
[stepper_z1]
step_pin: PF11
dir_pin: !PG3       # Dodaj ! jeśli jedzie w dół zamiast w górę
enable_pin: !PG5

rotation_distance: 8
microsteps: 16

[z_tilt]
z_positions:
    -90, 200           # Fizyczna pozycja lewej śruby (X, Y)
    490, 200           # Fizyczna pozycja prawej śruby (X, Y)
points:
    76, 200
    386, 200
speed: 250             # Prędkość przejazdów między punktami
horizontal_move_z: 5  # Na jaką wysokość podnieść oś Z przed przejazdem
retries: 10            # Ile prób wyrównania dopuszczamy
retry_tolerance: 0.02  # Dokładność (0.02mm jest bardzo ok dla tak dużego stołu)


[heater_fan hotend_fan]
pin: ebb36:PA0
max_power: 1.0
kick_start_time: 0.5
heater: extruder      # Powiązanie z sekcją [extruder]
heater_temp: 50.0      # Temperatura włączenia
fan_speed: 1.0         # Prędkość (1.0 = 100%)

[fan]
pin:  ebb36:PA1
max_power: 1.0


[extruder]
# SILNIK (Driver 4 Octopus)
step_pin: PF9
dir_pin: !PF10           # Jeśli będzie wciągał zamiast pchać, zmień na !PF10
enable_pin: !PG2
microsteps: 16
# rotation_distance: 33.500  # Startowa dla MK8 (Tronxy 1.8 deg)
# rotation_distance: 22.67   # Wartość dla samej zębatki
rotation_distance: 23.25   # Wartość dla samej zębatki
gear_ratio: 50:17          # Przełożenie 3:1 (dokładnie 50 zębów do 17)
nozzle_diameter: 0.400
filament_diameter: 1.750
control: pid
min_temp: 0
max_temp: 280             # 300 to dużo dla MK8 z rurką teflonową w środku!
min_extrude_temp: 170     # Zapobiega kręceniu silnikiem na zimno   -> 170
# GRZAŁKA I CZUJNIK (Wpięte do EBB36)
heater_pin: ebb36:PB13      # Grzałka na CAN
sensor_pin: ebb36:PA3       # To Twoje TH0 na CAN
sensor_type: ATC Semitec 104GT-2 # Sprawdź typ swojego termistora!
max_extrude_only_distance: 300
max_extrude_cross_section: 5.0
pid_kp:25.829
pid_ki:1.459
pid_kd:114.296


[tmc2209 extruder]
uart_pin: PF2             # Pin UART dla Motor 4 w Octopusie
run_current: 1        # Bezpieczny prąd dla silnika Tronxy
stealthchop_threshold: 0  # Ekstruder lepiej działa w trybie SpreadCycle (0)

[respond]
[display_status]
[heater_bed]
heater_pin: PA1
sensor_type: Generic 3950
sensor_pin: PF3
control: watermark
# min_temp: -100
# max_temp: 120
# sensor_type: EPCOS 100K B57560G104F
# sensor_pin: PF3
min_temp: -273
max_temp: 9999


[verify_heater extruder]
max_error: 120

[verify_heater heater_bed]
max_error: 120

# =========================
# TMC2209 UART
# =========================

[tmc2209 stepper_x]
uart_pin: PC4
# run_current: 1.25
# hold_current: 0.85
run_current: 1
hold_current: 0.5
stealthchop_threshold: 0
interpolate: True

[tmc2209 stepper_y]
uart_pin: PD11
# run_current: 1.25
# hold_current: 0.85
run_current: 1
hold_current: 0.5
stealthchop_threshold: 0
interpolate: True

[tmc2209 stepper_z]
uart_pin: PC6
run_current: 0.800
hold_current: 0.5

[tmc2209 stepper_z1]
uart_pin: PC7
run_current: 0.800
hold_current: 0.5

[bed_mesh]
speed: 200
horizontal_move_z: 5
mesh_min: 40, 40       # Minimalne współrzędne SONDY (nie dyszy!)
mesh_max: 360, 360     # Maksymalne współrzędne SONDY
probe_count: 5, 5      # Siatka 5x5 (25 punktów pomiaru)
algorithm: bicubic
fade_start: 1
fade_end: 10
fade_target: 0
adaptive_margin: 5


[autotune_tmc stepper_x]
motor: ldo-42sth40-1684ac
tuning_goal: silent

[autotune_tmc stepper_y]
motor: ldo-42sth40-1684ac
tuning_goal: silent

[autotune_tmc stepper_z]
motor: ldo-42sth40-1684ac
tuning_goal: silent

[autotune_tmc stepper_z1]
motor: ldo-42sth40-1684ac
tuning_goal: silent

[autotune_tmc extruder]
motor: ldo-42sth40-1684ac
tuning_goal: performance

[exclude_object]
[verify_heater heater_bed]
max_error: 120
check_gain_time: 120    # Dajemy mu 2 minuty na reakcję (stół 400mm jest wolny)
hysteresis: 5
heating_gain: 1



[screws_tilt_adjust]
# Poniższe punkty to współrzędne DYSZY. 
# Musisz je wyliczyć: pozycja śruby minus offset Twojego BLTouch.
screw1: 55, 29          # Punkt bazowy (lewy przód) - zazwyczaj ta śruba zostaje nieruchoma
screw1_name: lewy_przod
screw2: 399, 29
screw2_name: prawy_przod
screw3: 399, 382
screw3_name: prawy_tyl
screw4: 55, 382
screw4_name: lewy_tyl
horizontal_move_z: 10
speed: 150
screw_thread: CW-M3       # Tronxy zazwyczaj ma śruby M3. Jeśli masz większe, wpisz M4 lub M5.




[save_variables]
filename: ~/printer_data/config/variables.cfg # tam będą zapisane Twoje ustawienia
#############################################################################################################
#######################  MAKRO !! 
[gcode_macro PRINT_START]
gcode:
    # Pobranie parametrów z Slicera
    {% set BED_TEMP = params.BED|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER|default(200)|float %}
    {% set MATERIAL = params.MATERIAL|default("PLA")|string %}



    # Pobranie Twoich ustawień z makra KONFIG_DRUKU
    {% set do_mesh = printer["gcode_macro KONFIG_DRUKU"].mesh_enabled %}
    {% set petg_off = printer["gcode_macro KONFIG_DRUKU"].petg_offset %}
    {% set density = printer["gcode_macro KONFIG_DRUKU"].mesh_density %}

    M140 S{BED_TEMP}
    M104 S150
    G28 

    # --- LOGIKA MESH ---
    {% if do_mesh %}
        {action_respond_info("Adaptive Mesh ON (Gęstość: %s)" % density)}
        BED_MESH_CALIBRATE ADAPTIVE=1 PROBE_COUNT={density},{density}
    {% else %}
        {action_respond_info("Mesh OFF - ładuję profil default")}
        BED_MESH_PROFILE LOAD=default
    {% endif %}

    # --- LOGIKA OFFSETU ---
    {% if MATERIAL == "PETG" or MATERIAL == "PET" %}
        SET_GCODE_OFFSET Z={petg_off}
        {action_respond_info("Material: %s -> Offset +%s" % (MATERIAL, petg_off))}
    {% else %}
        SET_GCODE_OFFSET Z=0
        {action_respond_info("Material: %s -> Reset Offsetu" % MATERIAL)}
    {% endif %}

    M190 S{BED_TEMP}
    M109 S{EXTRUDER_TEMP}
    M117 Drukowanie...



[gcode_macro KONFIG_DRUKU]
variable_mesh_enabled: True
variable_petg_offset: 0.08
variable_mesh_density: 5
gcode:
    # Zawsze pobieramy aktualny stan z pamięci makra
    {% set mesh = printer["gcode_macro KONFIG_DRUKU"].mesh_enabled %}
    {% set off = printer["gcode_macro KONFIG_DRUKU"].petg_offset %}
    {% set dens = printer["gcode_macro KONFIG_DRUKU"].mesh_density %}
    
    {action_respond_info("--- AKTUALNA KONFIGURACJA ---
    Mesh aktywny: %s
    Offset PETG: %s mm
    Gęstość Mesh: %sx%s" % (mesh, off, dens, dens))}
[gcode_macro USTAW_MESH]
gcode:
    {% set stan = params.STAN|default('True')|lower == 'true' %}
    SET_GCODE_VARIABLE MACRO=KONFIG_DRUKU VARIABLE=mesh_enabled VALUE={stan}
    SAVE_VARIABLE VARIABLE=mesh_enabled VALUE={stan}
    {action_respond_info("Mesh ustawiony na: %s" % stan)}

[gcode_macro USTAW_OFFSET_PETG]
gcode:
    {% set offset = params.WARTOSC|default(0.08)|float %}
    SET_GCODE_VARIABLE MACRO=KONFIG_DRUKU VARIABLE=petg_offset VALUE={offset}
    SAVE_VARIABLE VARIABLE=petg_offset VALUE={offset}
    {action_respond_info("Nowy offset PETG: %s" % offset)}

[gcode_macro USTAW_GESTOSC_MESH]
gcode:
    {% set n = params.N|default(5)|int %}
    SET_GCODE_VARIABLE MACRO=KONFIG_DRUKU VARIABLE=mesh_density VALUE={n}
    SAVE_VARIABLE VARIABLE=mesh_density VALUE={n}
    {action_respond_info("Gęstość Mesh: %sx%s" % (n, n))}


[delayed_gcode _SYNCHRONIZACJA_ZMIENNYCH]
initial_duration: 1
gcode:
    {% set svv = printer.save_variables.variables %}
    
    {% if 'mesh_enabled' in svv %}
        SET_GCODE_VARIABLE MACRO=KONFIG_DRUKU VARIABLE=mesh_enabled VALUE={svv.mesh_enabled}
    {% endif %}
    
    {% if 'petg_offset' in svv %}
        SET_GCODE_VARIABLE MACRO=KONFIG_DRUKU VARIABLE=petg_offset VALUE={svv.petg_offset}
    {% endif %}
    
    {% if 'mesh_density' in svv %}
        SET_GCODE_VARIABLE MACRO=KONFIG_DRUKU VARIABLE=mesh_density VALUE={svv.mesh_density}
    {% endif %}
    
    {action_respond_info("Parametry z pliku variables.cfg zostały wczytane.")}

[gcode_macro TEST_OFFSETU_XY]
description: Weryfikacja punktu dysza/sonda na bezpiecznej wysokości 1mm
gcode:
    # 1. Pobierz offsety z konfiguracji
    {% set ox = printer.configfile.config["bltouch"]["x_offset"]|float %}
    {% set oy = printer.configfile.config["bltouch"]["y_offset"]|float %}
    
    # 2. Punkt testowy (domyślnie 150, 200)
    {% set tx = params.X|default(150)|float %}
    {% set ty = params.Y|default(200)|float %}

    G28 ; Home
    G90 ; Absolutne
    
    # --- KROK 1: DYSZA ---
    {action_respond_info("DYSZA: Jadę nad punkt...")}
    G1 X{tx} Y{ty} Z10 F6000          # Najazd nad punkt
    G1 Z3.0 F1500                    # Zjazd na górny pułap mrugania
    
    # Mruganie (3 razy: 3mm -> 1mm)
    {% for i in range(3) %}
        G1 Z1.0 F1000                # Dół
        G4 P300
        G1 Z3.0 F1000                # Góra
        G4 P300
    {% endfor %}
    
    G1 Z1.0 F600                     # Zostaje na 1mm
    {action_respond_info("DYSZA: 1mm nad stołem. Sprawdź celownik! Czekam 5s...")}
    G4 P5000                         # Czekaj 5s
    
    G1 Z15 F1500                     # Podniesienie przed zmianą
    
    # --- KROK 2: BLTOUCH ---
    {action_respond_info("SONDA: Przesuwanie nad punkt...")}
    {% set move_x = tx - ox %}
    {% set move_y = ty - oy %}
    
    G1 X{move_x} Y{move_y} F6000    # Przejazd sondą nad punkt
    
    # Wysunięcie igły i zjazd na 1mm
    BLTOUCH_DEBUG COMMAND=pin_down   # Wysuń igłę
    G1 Z5 F1500                      # Zjazd pomocniczy
    G1 Z1.0 F600                     # Igła na 1mm nad stół
    
    {action_respond_info("SONDA: Igła 1mm nad stołem. Powinna być w tym samym punkcie. Czekam 10s...")}
    G4 P10000                        # Czekaj 10s
    
    # --- KONIEC ---
    G1 Z20 F1500
    BLTOUCH_DEBUG COMMAND=pin_up     # Schowaj igłę
    BLTOUCH_DEBUG COMMAND=reset      # Reset
    {action_respond_info("Test zakończony.")}
    
    
